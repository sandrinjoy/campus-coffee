# Build subprojects in parallel. Gradle still honors the project dependency graph: domain builds
# first, api and data (which depend only on domain) run in parallel, then application, then coverage.
org.gradle.parallel=true
# Reuse task outputs across builds when inputs are unchanged.
org.gradle.caching=true
# kapt only needs the annotation processors on its classpath, not the full compile classpath; this
# avoids the "Annotation processors discovery from compile classpath" warning and a redundant scan.
kapt.include.compile.classpath=false
