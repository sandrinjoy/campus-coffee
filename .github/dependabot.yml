# Dependabot keeps the GitHub Actions and Gradle (Kotlin/Java) dependencies current. Most versions
# live in the gradle/libs.versions.toml catalog, which the gradle ecosystem updates (BOM-managed
# dependencies without an explicit version follow the Spring Boot BOM and are not bumped here).
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Workflow actions in .github/workflows/ (actions/checkout, actions/upload-artifact, jdx/mise-action).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  # Gradle dependencies and plugins, resolved from the version catalog (covers the root build and
  # the build-logic convention plugins, which reference the same catalog).
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Bundle minor and patch bumps into one PR; major upgrades get their own PR for careful review.
      gradle-minor-and-patch:
        update-types: ["minor", "patch"]
